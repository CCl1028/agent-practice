server {
    listen 80;
    server_name fundpal.xyz www.fundpal.xyz;

    # Let's Encrypt 验证路径
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # HTTP -> HTTPS 自动跳转
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name fundpal.xyz www.fundpal.xyz;

    # Let's Encrypt 证书
    ssl_certificate     /etc/letsencrypt/live/fundpal.xyz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/fundpal.xyz/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # 反向代理到 FastAPI
    location / {
        proxy_pass http://fund-assistant:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
