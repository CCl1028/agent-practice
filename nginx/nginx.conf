server {
    listen 80;
    server_name fundpal.xyz www.fundpal.xyz;

    # HTTP -> HTTPS 自动跳转
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name fundpal.xyz www.fundpal.xyz;

    # 自签名证书（配合 Cloudflare Full SSL 模式）
    ssl_certificate     /etc/letsencrypt/selfsigned/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/selfsigned/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # 反向代理到 FastAPI
    location / {
        proxy_pass http://fund-assistant:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
