<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💰</text></svg>">
<title>基金小助理</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

html, body {
  overflow: hidden;
  width: 100%;
  height: 100%;
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
}

:root {
  --bg: #faf5f3;
  --card: #ffffff;
  --card-hover: #fef0ed;
  --border: #ecdad6;
  --text: #3d2b2b;
  --text-secondary: #8a7070;
  --accent: #b84e4a;
  --accent-light: #cf6e6a;
  --green: #2e9464;
  --green-bg: rgba(46,148,100,0.10);
  --red: #c94544;
  --red-bg: rgba(201,69,68,0.10);
  --yellow: #b8892e;
  --yellow-bg: rgba(184,137,46,0.10);
}

body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  background: var(--bg);
  color: var(--text);
}

.scroll-wrapper {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  padding-bottom: 100px;
}

.container { max-width: 480px; margin: 0 auto; padding: 0 16px; }

/* Header */
.header {
  padding: 24px 0 16px;
  border-bottom: 1px solid var(--border);
  margin-bottom: 20px;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
}
.header-center { text-align: center; }
.header h1 { font-size: 20px; font-weight: 600; }
.header p { font-size: 13px; color: var(--text-secondary); margin-top: 4px; }
.settings-trigger {
  position: absolute;
  right: 0;
  top: 50%;
  transform: translateY(-50%);
  background: none;
  border: none;
  color: var(--text-secondary);
  font-size: 20px;
  cursor: pointer;
  padding: 6px;
  border-radius: 8px;
  transition: all 0.2s;
  line-height: 1;
}
.settings-trigger:hover { color: var(--text); background: var(--card); }

/* 简报卡片 */
.briefing-card {
  background: linear-gradient(135deg, #fce8e4 0%, #ffffff 100%);
  border: 1px solid #e8c4bf;
  border-radius: 16px;
  padding: 20px;
  margin-bottom: 16px;
  position: relative;
  overflow: hidden;
}
.briefing-card::before {
  content: '';
  position: absolute;
  top: -50%;
  right: -30%;
  width: 200px;
  height: 200px;
  background: radial-gradient(circle, rgba(184,78,74,0.06), transparent);
  border-radius: 50%;
}
.briefing-summary {
  font-size: 22px;
  font-weight: 700;
  margin-bottom: 16px;
  position: relative;
  word-break: break-word;
}
.briefing-market {
  font-size: 13px;
  color: var(--text-secondary);
  line-height: 1.6;
  position: relative;
  word-break: break-word;
}

/* 持仓列表 */
.section-title {
  font-size: 14px;
  font-weight: 600;
  color: var(--text-secondary);
  margin: 20px 0 12px;
  display: flex;
  align-items: center;
  gap: 6px;
}

.fund-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 16px;
  margin-bottom: 10px;
  transition: background 0.2s;
}
.fund-card:hover { background: var(--card-hover); }

.fund-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 8px;
  gap: 10px;
}
.fund-name { font-size: 15px; font-weight: 600; word-break: break-word; min-width: 0; }
.fund-code { font-size: 12px; color: var(--text-secondary); }

.fund-action {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 4px 10px;
  border-radius: 20px;
  font-size: 13px;
  font-weight: 600;
  white-space: nowrap;
  flex-shrink: 0;
}
.action-buy { background: var(--red-bg); color: var(--red); }
.action-sell { background: var(--green-bg); color: var(--green); }
.action-hold { background: var(--yellow-bg); color: var(--yellow); }

.fund-reason {
  font-size: 13px;
  color: var(--text-secondary);
  line-height: 1.5;
  word-break: break-word;
}
.fund-est {
  display: inline-flex;
  align-items: center;
  gap: 3px;
  font-size: 12px;
  font-weight: 600;
  margin-top: 6px;
  padding: 2px 8px;
  border-radius: 6px;
}
.fund-est.up { background: var(--red-bg); color: var(--red); }
.fund-est.down { background: var(--green-bg); color: var(--green); }
.fund-est.flat { background: rgba(138,112,112,0.10); color: #8a7070; }
.fund-est-label { font-size: 11px; color: var(--text-secondary); font-weight: 400; }
.fund-est-time { font-size: 10px; color: var(--text-secondary); font-weight: 400; margin-left: 2px; }

.fund-delete {
  background: none;
  border: none;
  color: var(--text-secondary);
  cursor: pointer;
  font-size: 12px;
  padding: 2px 6px;
  border-radius: 4px;
  opacity: 0;
  transition: opacity 0.2s;
}
.fund-card:hover .fund-delete { opacity: 1; }
.fund-delete:hover { color: var(--red); background: var(--red-bg); }

/* 吸底输入栏 */
.bottom-input-bar {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  background: var(--card);
  border-top: 1px solid var(--border);
  box-shadow: 0 -8px 24px rgba(0,0,0,0.12);
  padding: 10px 16px;
  padding-bottom: max(10px, env(safe-area-inset-bottom));
  z-index: 800;
}
.bottom-input-bar .input-row {
  display: flex;
  align-items: flex-end;
  gap: 8px;
  max-width: 480px;
  margin: 0 auto;
}
.bottom-input-bar .text-input {
  flex: 1;
  min-height: 40px;
  max-height: 120px;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 10px 16px;
  color: var(--text);
  font-size: 14px;
  resize: none;
  font-family: inherit;
  line-height: 1.4;
  overflow-y: auto;
  scrollbar-width: none;
  -ms-overflow-style: none;
}
.bottom-input-bar .text-input::-webkit-scrollbar { display: none; }
.bottom-input-bar .text-input::placeholder { color: #bca8a8; }
.bottom-input-bar .text-input:focus { outline: none; border-color: var(--accent); }

.bottom-input-bar .icon-btn {
  width: 40px;
  height: 40px;
  border-radius: 50%;
  border: none;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  flex-shrink: 0;
  transition: all 0.2s;
  font-size: 18px;
}
.bottom-input-bar .upload-btn {
  background: var(--bg);
  color: var(--text-secondary);
  border: 1px solid var(--border);
}
.bottom-input-bar .upload-btn:hover { border-color: var(--accent); color: var(--accent); }
.bottom-input-bar .upload-btn.has-file { background: var(--green-bg); color: var(--green); border-color: var(--green); }
.bottom-input-bar .send-btn {
  background: var(--accent);
  color: white;
}
.bottom-input-bar .send-btn:hover { background: var(--accent-light); }
.bottom-input-bar .send-btn:disabled {
  background: #e8d8d5;
  color: #a89090;
  cursor: not-allowed;
}
.bottom-input-bar .file-hint {
  font-size: 11px;
  color: var(--text-secondary);
  text-align: center;
  margin-top: 4px;
  max-width: 480px;
  margin-left: auto;
  margin-right: auto;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.bottom-input-bar .file-hint .clear-file {
  color: var(--red);
  cursor: pointer;
  margin-left: 4px;
}
.bottom-input-bar input[type="file"] { display: none; }

/* 生成按钮 */
.generate-area {
  margin-top: 16px;
  display: flex;
  align-items: center;
  gap: 12px;
}
.generate-btn {
  flex: 1;
  padding: 14px;
  background: linear-gradient(135deg, var(--accent), #c47a4a);
  color: white;
  border: none;
  border-radius: 12px;
  font-size: 16px;
  font-weight: 600;
  cursor: pointer;
  transition: transform 0.1s, box-shadow 0.2s;
  box-shadow: 0 4px 16px rgba(184,78,74,0.3);
}
.generate-btn:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(184,78,74,0.4); }
.generate-btn:active { transform: translateY(0); }
.generate-btn:disabled {
  background: #e8d8d5;
  box-shadow: none;
  cursor: not-allowed;
  transform: none;
}
.push-toggle {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 12px;
  color: var(--text-secondary);
  white-space: nowrap;
  flex-shrink: 0;
}
.push-toggle label {
  cursor: pointer;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
}
.toggle-switch {
  position: relative;
  width: 36px;
  height: 20px;
  appearance: none;
  -webkit-appearance: none;
  background: var(--border);
  border-radius: 10px;
  cursor: pointer;
  transition: background 0.2s;
  outline: none;
}
.toggle-switch:checked { background: var(--accent); }
.toggle-switch::before {
  content: '';
  position: absolute;
  top: 2px;
  left: 2px;
  width: 16px;
  height: 16px;
  background: white;
  border-radius: 50%;
  transition: transform 0.2s;
}
.toggle-switch:checked::before { transform: translateX(16px); }

/* Loading */
.loading {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  padding: 40px;
  color: var(--text-secondary);
  font-size: 14px;
}
.spinner {
  width: 20px;
  height: 20px;
  border: 2px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* Toast */
.toast {
  position: fixed;
  top: 20px;
  left: 50%;
  transform: translateX(-50%) translateY(-100px);
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 12px 20px;
  font-size: 14px;
  z-index: 1000;
  transition: transform 0.3s ease;
  box-shadow: 0 8px 30px rgba(0,0,0,0.1);
}
.toast.show { transform: translateX(-50%) translateY(0); }
.toast.success { border-color: var(--green); }
.toast.error { border-color: var(--red); }

/* Empty state */
.empty-state {
  text-align: center;
  padding: 40px 20px;
  color: var(--text-secondary);
}
.empty-state-icon { font-size: 48px; margin-bottom: 12px; }
.empty-state-text { font-size: 14px; line-height: 1.6; }

/* 设置抽屉 */
.drawer-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.5);
  z-index: 900;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.3s;
}
.drawer-overlay.open { opacity: 1; pointer-events: auto; }

.drawer {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  max-height: 85vh;
  background: var(--card);
  border-top-left-radius: 20px;
  border-top-right-radius: 20px;
  z-index: 901;
  transform: translateY(100%);
  transition: transform 0.3s ease;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
.drawer.open { transform: translateY(0); }

.drawer-handle {
  display: flex;
  justify-content: center;
  padding: 10px 0 4px;
  cursor: grab;
  flex-shrink: 0;
}
.drawer-handle-bar {
  width: 36px;
  height: 4px;
  background: var(--border);
  border-radius: 2px;
}

.drawer-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 4px 20px 12px;
  flex-shrink: 0;
}
.drawer-header h3 { font-size: 16px; font-weight: 600; }
.drawer-close {
  background: none;
  border: none;
  color: var(--text-secondary);
  font-size: 22px;
  cursor: pointer;
  padding: 4px 8px;
  border-radius: 8px;
  line-height: 1;
}
.drawer-close:hover { color: var(--text); background: var(--bg); }

.drawer-body {
  overflow-y: auto;
  padding: 0 20px 24px;
  -webkit-overflow-scrolling: touch;
}

.settings-desc {
  font-size: 12px;
  color: var(--text-secondary);
  margin-bottom: 14px;
}
.config-group {
  margin-bottom: 16px;
}
.config-group:last-child { margin-bottom: 0; }
.config-group-title {
  font-size: 12px;
  font-weight: 600;
  color: var(--accent-light);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-bottom: 10px;
}
.config-item {
  margin-bottom: 10px;
}
.config-label {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 4px;
}
.config-label-text {
  font-size: 13px;
  color: var(--text);
}
.config-label-hint {
  font-size: 11px;
  color: var(--text-secondary);
}
.config-status {
  font-size: 11px;
  padding: 1px 6px;
  border-radius: 10px;
}
.config-status.on { background: var(--green-bg); color: var(--green); }
.config-status.off { background: rgba(138,112,112,0.10); color: #a89090; }
.config-input-row {
  display: flex;
  gap: 6px;
}
.config-input {
  flex: 1;
  min-width: 0;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 8px 10px;
  color: var(--text);
  font-size: 13px;
  font-family: "SF Mono", "Menlo", monospace;
}
.config-input::placeholder { color: #bca8a8; }
.config-input:focus { outline: none; border-color: var(--accent); }
.config-save-btn {
  padding: 8px 12px;
  background: var(--accent);
  color: white;
  border: none;
  border-radius: 8px;
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  white-space: nowrap;
  transition: background 0.2s;
  flex-shrink: 0;
}
.config-save-btn:hover { background: var(--accent-light); }
.config-save-btn:disabled { background: #e8d8d5; color: #a89090; cursor: not-allowed; }
.config-clear-btn {
  padding: 8px 10px;
  background: transparent;
  color: var(--text-secondary);
  border: 1px solid var(--border);
  border-radius: 8px;
  font-size: 12px;
  cursor: pointer;
  flex-shrink: 0;
  transition: all 0.2s;
}
.config-clear-btn:hover { border-color: var(--red); color: var(--red); }
.push-test-btn {
  background: transparent;
  border: 1px solid var(--accent);
  color: var(--accent);
  padding: 8px 14px;
  border-radius: 8px;
  font-size: 13px;
  cursor: pointer;
  margin-top: 14px;
  transition: all 0.2s;
}
.push-test-btn:hover { background: var(--accent); color: white; }
.push-test-btn:disabled { opacity: 0.5; cursor: not-allowed; }
.push-result {
  margin-top: 8px;
  font-size: 13px;
  color: var(--text-secondary);
}
.divider {
  border: none;
  border-top: 1px solid var(--border);
  margin: 14px 0;
}

/* 推送时间设置 */
.schedule-section {
  margin-top: 4px;
}
.schedule-row {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-top: 8px;
}
.schedule-row input[type="time"] {
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 8px 12px;
  color: var(--text);
  font-size: 15px;
  font-family: inherit;
  flex: 1;
  min-width: 0;
}
.schedule-row input[type="time"]:focus { outline: none; border-color: var(--accent); }
.schedule-save-btn {
  padding: 8px 14px;
  background: var(--accent);
  color: white;
  border: none;
  border-radius: 8px;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  white-space: nowrap;
  flex-shrink: 0;
  transition: background 0.2s;
}
.schedule-save-btn:hover { background: var(--accent-light); }
.schedule-save-btn:disabled { background: #e8d8d5; color: #a89090; cursor: not-allowed; }
.schedule-info {
  font-size: 12px;
  color: var(--text-secondary);
  margin-top: 6px;
}
.schedule-disable-btn {
  background: transparent;
  border: 1px solid var(--border);
  color: var(--text-secondary);
  padding: 8px 10px;
  border-radius: 8px;
  font-size: 12px;
  cursor: pointer;
  flex-shrink: 0;
  transition: all 0.2s;
}
.schedule-disable-btn:hover { border-color: var(--red); color: var(--red); }

/* 响应式 */
@media (min-width: 768px) {
  .container { max-width: 520px; }
}
</style>
</head>
<body>
<div class="scroll-wrapper" id="scroll-wrapper">
<div class="container">
  <!-- Header -->
  <div class="header">
    <div class="header-center">
      <h1>📈 基金小助理</h1>
      <p>💰💰💰</p>
    </div>
    <button class="settings-trigger" onclick="openDrawer()" title="设置">⚙️</button>
  </div>

  <!-- 简报区域 -->
  <div id="briefing-area">
    <div class="empty-state" id="empty-briefing">
      <div class="empty-state-icon">🎯</div>
      <div class="empty-state-text">点击下方按钮<br>生成今日操作建议</div>
    </div>
  </div>

  <!-- 生成简报按钮 -->
  <div class="generate-area">
    <button class="generate-btn" id="generate-btn" onclick="generateBriefing()">
      ⚡ 生成今日简报
    </button>
    <div class="push-toggle">
      <label>
        <input type="checkbox" class="toggle-switch" id="push-switch" checked>
        <span>推送</span>
      </label>
    </div>
  </div>

  <!-- 持仓列表 -->
  <div class="section-title" id="portfolio-title" style="display:none">
    📂 我的持仓
  </div>
  <div id="portfolio-list"></div>


</div>
</div><!-- end scroll-wrapper -->

<!-- 吸底输入栏 -->
<div class="bottom-input-bar" id="bottom-bar">
  <div class="input-row">
    <button class="icon-btn upload-btn" id="upload-btn" onclick="document.getElementById('file-input').click()" title="上传截图">
      📷
    </button>
    <input type="file" id="file-input" accept="image/*" onchange="onFileSelected(this)">
    <textarea class="text-input" id="text-input" rows="1"
      placeholder="描述持仓或上传截图"
      oninput="autoGrow(this); toggleSend()"></textarea>
    <button class="icon-btn send-btn" id="send-btn" onclick="handleSend()" disabled title="发送">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
    </button>
  </div>
  <div class="file-hint" id="file-hint" style="display:none"></div>
</div>

<!-- 设置抽屉 -->
<div class="drawer-overlay" id="drawer-overlay" onclick="closeDrawer()"></div>
<div class="drawer" id="drawer">
  <div class="drawer-handle"><div class="drawer-handle-bar"></div></div>
  <div class="drawer-header">
    <h3>⚙️ 设置</h3>
    <button class="drawer-close" onclick="closeDrawer()">✕</button>
  </div>
  <div class="drawer-body">
    <div class="settings-desc">配置推送渠道和 AI 模型，修改后立即生效</div>

    <div id="config-panel">
      <div class="loading"><div class="spinner"></div>加载配置...</div>
    </div>

    <hr class="divider">

    <div class="config-group schedule-section">
      <div class="config-group-title">⏰ 定时推送</div>
      <div class="config-label">
        <span class="config-label-text">每日推送时间</span>
        <span class="config-status" id="schedule-status">加载中</span>
      </div>
      <div class="schedule-row">
        <input type="time" id="push-time-input" value="14:30">
        <button class="schedule-save-btn" id="schedule-save-btn" onclick="saveSchedule()">保存</button>
        <button class="schedule-disable-btn" id="schedule-disable-btn" onclick="disableSchedule()">关闭</button>
      </div>
      <div class="schedule-info" id="schedule-info"></div>
    </div>

    <hr class="divider">
    <button class="push-test-btn" id="push-test-btn" onclick="testPush()">🧪 发送测试推送</button>
    <div class="push-result" id="push-result"></div>

    <hr class="divider">
    <button class="push-test-btn" id="logs-toggle-btn" onclick="toggleLogs()">📋 查看错误日志</button>
    <div id="logs-panel" style="display:none;margin-top:10px;">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;">
        <select id="log-level-filter" onchange="fetchLogs()" style="background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:4px 8px;font-size:12px;color:var(--text);">
          <option value="">全部级别</option>
          <option value="ERROR" selected>ERROR</option>
          <option value="WARNING">WARNING</option>
          <option value="INFO">INFO</option>
        </select>
        <button onclick="fetchLogs()" style="background:none;border:1px solid var(--border);border-radius:6px;padding:4px 8px;font-size:12px;color:var(--text-secondary);cursor:pointer;">🔄 刷新</button>
        <button onclick="clearLogs()" style="background:none;border:1px solid var(--border);border-radius:6px;padding:4px 8px;font-size:12px;color:var(--red);cursor:pointer;">🗑️ 清空</button>
      </div>
      <div id="logs-content" style="background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:10px;max-height:300px;overflow-y:auto;font-family:'SF Mono','Menlo',monospace;font-size:11px;line-height:1.6;color:var(--text);white-space:pre-wrap;word-break:break-all;">
        加载中...
      </div>
      <div id="logs-count" style="font-size:11px;color:var(--text-secondary);margin-top:4px;text-align:right;"></div>
    </div>

    <hr class="divider">
    <div class="version-info" id="version-info" style="font-size:11px;color:var(--text-secondary);text-align:center;padding:4px 0 8px;">
      加载版本信息...
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
const API = '';  // 同源，无需前缀
const PORTFOLIO_KEY = 'fund_assistant_portfolio';  // localStorage key

// ---- 本地存储工具 ----
function getLocalPortfolio() {
  try {
    const data = localStorage.getItem(PORTFOLIO_KEY);
    return data ? JSON.parse(data) : [];
  } catch (e) {
    console.error('读取本地持仓失败:', e);
    return [];
  }
}

function saveLocalPortfolio(holdings) {
  try {
    localStorage.setItem(PORTFOLIO_KEY, JSON.stringify(holdings));
  } catch (e) {
    console.error('保存本地持仓失败:', e);
  }
}

// ---- 简报 ----
async function generateBriefing() {
  const withPush = document.getElementById('push-switch').checked;
  const btn = document.getElementById('generate-btn');
  btn.disabled = true;
  btn.textContent = withPush ? '⏳ 生成并推送中...' : '⏳ 分析中...（约10秒）';

  const area = document.getElementById('briefing-area');
  area.innerHTML = '<div class="loading"><div class="spinner"></div>Agent 正在分析...</div>';

  // 将本地持仓传给后端
  const localHoldings = getLocalPortfolio();
  if (localHoldings.length === 0) {
    area.innerHTML = '<div class="empty-state"><div class="empty-state-icon">📂</div><div class="empty-state-text">请先添加持仓再生成简报</div></div>';
    btn.disabled = false;
    btn.textContent = '⚡ 生成今日简报';
    showToast('请先添加持仓', 'error');
    return;
  }

  const endpoint = withPush ? '/api/briefing-and-push' : '/api/briefing';

  try {
    const res = await fetch(API + endpoint, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ holdings: localHoldings }),
    });
    if (!res.ok) throw new Error('服务器返回 ' + res.status);
    const data = await res.json();
    renderBriefing(data.raw);

    if (withPush && data.push_results) {
      const pushMsg = formatPushResults(data.push_results);
      showToast('简报已生成 ' + pushMsg, 'success');
    } else {
      showToast('简报已生成 ✅', 'success');
    }
  } catch (e) {
    area.innerHTML = '<div class="empty-state"><div class="empty-state-icon">😵</div><div class="empty-state-text">生成失败，请重试</div></div>';
    showToast('生成失败: ' + e.message, 'error');
  } finally {
    btn.disabled = false;
    btn.textContent = '⚡ 生成今日简报';
  }
}

function formatPushResults(results) {
  const parts = [];
  if (results.bark === true) parts.push('Bark✅');
  else if (results.bark === false) parts.push('Bark❌');
  if (results.serverchan === true) parts.push('微信✅');
  else if (results.serverchan === false) parts.push('微信❌');
  if (results.wecom === true) parts.push('企微✅');
  else if (results.wecom === false) parts.push('企微❌');
  return parts.length > 0 ? '| 推送: ' + parts.join(' ') : '✅';
}

function renderBriefing(briefing) {
  const area = document.getElementById('briefing-area');
  const details = briefing.details || [];

  let fundsHtml = details.map(d => {
    const cls = d.action === '加仓' ? 'action-buy' : d.action === '减仓' ? 'action-sell' : 'action-hold';
    const emoji = d.action === '加仓' ? '🟢' : d.action === '减仓' ? '🔴' : '⏸️';
    return `
      <div class="fund-card">
        <div class="fund-header">
          <div>
            <div class="fund-name">${d.fund_name}</div>
          </div>
          <div class="fund-action ${cls}">${emoji} ${d.action}</div>
        </div>
        <div class="fund-reason">${d.reason || ''}</div>
      </div>
    `;
  }).join('');

  area.innerHTML = `
    <div class="briefing-card">
      <div class="briefing-summary">💡 ${briefing.summary || '暂无建议'}</div>
      <div class="briefing-market">${briefing.market_note || ''}</div>
    </div>
    ${fundsHtml}
  `;
}

// ---- 持仓 ----
// 前端估值缓存：{fund_code: {est_change, est_nav, est_time, is_live}}
let estimationCache = {};

function loadPortfolio(skipEstimation) {
  const holdings = getLocalPortfolio();
  renderPortfolio(holdings);
  if (!skipEstimation && holdings.length > 0) {
    loadEstimation(holdings);
  }
}

function renderPortfolio(holdings) {
  const list = document.getElementById('portfolio-list');
  const title = document.getElementById('portfolio-title');

  if (!holdings || holdings.length === 0) {
    title.style.display = 'none';
    list.innerHTML = '';
    return;
  }

  title.style.display = 'flex';
  list.innerHTML = holdings.map(h => `
    <div class="fund-card">
      <div class="fund-header">
        <div>
          <span class="fund-name">${h.fund_name || '未知'}</span>
          <span class="fund-code">${h.fund_code || ''}</span>
        </div>
        <button class="fund-delete" onclick="deleteHolding('${h.fund_code}')">删除</button>
      </div>
      <div class="fund-reason">
        成本: ¥${(h.cost || 0).toLocaleString()}
        ${h.profit_ratio ? ' · 收益: ' + (h.profit_ratio > 0 ? '+' : '') + h.profit_ratio + '%' : ''}
        ${h.hold_days ? ' · 持有' + h.hold_days + '天' : ''}
      </div>
      <div id="est-${h.fund_code}"></div>
    </div>
  `).join('');

  // 立即用缓存的估值数据填充 DOM
  applyEstimationCache(holdings);
}

function applyEstimationCache(holdings) {
  for (const h of holdings) {
    const f = estimationCache[h.fund_code];
    if (!f) continue;
    renderSingleEstimation(h.fund_code, f);
  }
}

function renderSingleEstimation(fund_code, f) {
  const el = document.getElementById('est-' + fund_code);
  if (!el || f.est_change === null || f.est_change === undefined) return;
  if (f.est_time === '暂无数据') {
    el.innerHTML = `<span class="fund-est flat"><span class="fund-est-label">暂无估值数据</span></span>`;
    return;
  }
  const cls = f.est_change > 0.05 ? 'up' : f.est_change < -0.05 ? 'down' : 'flat';
  const sign = f.est_change > 0 ? '+' : '';
  if (f.is_live) {
    el.innerHTML = `<span class="fund-est ${cls}">` +
      `<span class="fund-est-label">盘中估值</span> ${sign}${f.est_change.toFixed(2)}%` +
      (f.est_time ? ` <span class="fund-est-time">${f.est_time}</span>` : '') +
      `</span>`;
  } else {
    el.innerHTML = `<span class="fund-est ${cls}">` +
      `<span class="fund-est-label">${f.est_time || '上日收盘'}</span> ${sign}${f.est_change.toFixed(2)}%` +
      `</span>`;
  }
}

async function loadEstimation(holdings) {
  if (!holdings || holdings.length === 0) return;
  try {
    const res = await fetch(API + '/api/estimation', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ holdings }),
    });
    const data = await res.json();
    for (const f of data.funds) {
      // 更新前端缓存
      estimationCache[f.fund_code] = f;
      renderSingleEstimation(f.fund_code, f);
    }
  } catch (e) { /* silent */ }
}

// 只对新增的基金拉取估值，不刷新已有基金
async function loadEstimationForNew(newCodes) {
  if (!newCodes || newCodes.length === 0) return;
  const holdings = newCodes.map(c => ({ fund_code: c }));
  try {
    const res = await fetch(API + '/api/estimation', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ holdings }),
    });
    const data = await res.json();
    for (const f of data.funds) {
      estimationCache[f.fund_code] = f;
      renderSingleEstimation(f.fund_code, f);
    }
  } catch (e) { /* silent */ }
}

function deleteHolding(code) {
  const holdings = getLocalPortfolio();
  const filtered = holdings.filter(h => h.fund_code !== code);
  saveLocalPortfolio(filtered);
  showToast('已删除', 'success');
  loadPortfolio(true); // skipEstimation: 不重新拉估值，用缓存
}

// ---- 吸底输入栏 ----
let pendingFile = null;

function autoGrow(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

function toggleSend() {
  const text = document.getElementById('text-input').value.trim();
  document.getElementById('send-btn').disabled = !text && !pendingFile;
}

function onFileSelected(input) {
  const file = input.files[0];
  if (!file) return;
  pendingFile = file;
  document.getElementById('upload-btn').classList.add('has-file');
  document.getElementById('file-hint').style.display = 'block';
  document.getElementById('file-hint').innerHTML = '📎 ' + file.name + ' <span class="clear-file" onclick="clearFile()">✕</span>';
  toggleSend();
}

function clearFile() {
  pendingFile = null;
  document.getElementById('file-input').value = '';
  document.getElementById('upload-btn').classList.remove('has-file');
  document.getElementById('file-hint').style.display = 'none';
  toggleSend();
}

async function handleSend() {
  const text = document.getElementById('text-input').value.trim();
  if (pendingFile) {
    await addFromScreenshot();
  } else if (text) {
    await addFromText();
  }
}

async function addFromText() {
  const input = document.getElementById('text-input');
  const text = input.value.trim();
  if (!text) return;

  const btn = document.getElementById('send-btn');
  btn.disabled = true;

  try {
    // 调用后端解析自然语言，但不保存到服务器
    const res = await fetch(API + '/api/portfolio/parse-text', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ text }),
    });
    if (!res.ok) {
      const errText = await res.text();
      throw new Error(errText || '服务器返回 ' + res.status);
    }
    const data = await res.json();
    if (data.parsed && data.parsed.length > 0) {
      // 保存到本地 localStorage
      const existing = getLocalPortfolio();
      const existingMap = {};
      for (const f of existing) {
        const key = f.fund_code || f.fund_name || '';
        if (key) existingMap[key] = f;
      }
      for (const h of data.parsed) {
        const key = h.fund_code || h.fund_name || '';
        if (key) existingMap[key] = h;
      }
      const merged = Object.values(existingMap);
      saveLocalPortfolio(merged);

      showToast(`成功添加 ${data.parsed.length} 只基金 ✅`, 'success');
      input.value = '';
      autoGrow(input);
      // 收集新增基金的 code
      const newCodes = data.parsed.map(h => h.fund_code).filter(Boolean);
      loadPortfolio(true); // 跳过全量估值
      loadEstimationForNew(newCodes); // 只拉新基金估值
    } else {
      showToast('未识别到基金信息，换个描述试试', 'error');
    }
  } catch (e) {
    showToast('识别失败: ' + e.message, 'error');
  } finally {
    toggleSend();
  }
}

async function addFromScreenshot() {
  if (!pendingFile) return;

  const btn = document.getElementById('send-btn');
  btn.disabled = true;

  try {
    const form = new FormData();
    form.append('file', pendingFile);
    const text = document.getElementById('text-input').value.trim();
    if (text) form.append('text', text);
    // 调用后端解析截图，但不保存到服务器
    const res = await fetch(API + '/api/portfolio/parse-screenshot', {
      method: 'POST',
      body: form,
    });
    if (!res.ok) {
      const errText = await res.text();
      throw new Error(errText || '服务器返回 ' + res.status);
    }
    const data = await res.json();
    if (data.parsed && data.parsed.length > 0) {
      // 保存到本地 localStorage
      const existing = getLocalPortfolio();
      const existingMap = {};
      for (const f of existing) {
        const key = f.fund_code || f.fund_name || '';
        if (key) existingMap[key] = f;
      }
      for (const h of data.parsed) {
        const key = h.fund_code || h.fund_name || '';
        if (key) existingMap[key] = h;
      }
      const merged = Object.values(existingMap);
      saveLocalPortfolio(merged);

      showToast(`成功添加 ${data.parsed.length} 只基金 ✅`, 'success');
      document.getElementById('text-input').value = '';
      autoGrow(document.getElementById('text-input'));
      clearFile();
      const newCodes = data.parsed.map(h => h.fund_code).filter(Boolean);
      loadPortfolio(true); // 跳过全量估值
      loadEstimationForNew(newCodes); // 只拉新基金估值
    } else {
      showToast('未识别到基金信息，换张截图试试', 'error');
    }
  } catch (e) {
    showToast('识别失败: ' + e.message, 'error');
  } finally {
    toggleSend();
  }
}

// ---- 设置抽屉 ----
function preventScroll(e) { e.preventDefault(); }
function openDrawer() {
  document.getElementById('drawer-overlay').classList.add('open');
  document.getElementById('drawer').classList.add('open');
  var sw = document.getElementById('scroll-wrapper');
  sw._savedScrollTop = sw.scrollTop;
  sw.style.overflow = 'hidden';
  document.getElementById('drawer-overlay').addEventListener('touchmove', preventScroll, { passive: false });
  loadConfig();
  loadVersion();
}
function closeDrawer() {
  document.getElementById('drawer-overlay').classList.remove('open');
  document.getElementById('drawer').classList.remove('open');
  var sw = document.getElementById('scroll-wrapper');
  sw.style.overflow = '';
  if (sw._savedScrollTop != null) sw.scrollTop = sw._savedScrollTop;
  document.getElementById('drawer-overlay').removeEventListener('touchmove', preventScroll);
}

// ---- 配置面板 ----
const CONFIG_FIELDS = [
  { group: '📤 推送渠道', items: [
    { key: 'BARK_URL', label: 'Bark', placeholder: 'https://api.day.app/你的key', hint: 'iPhone 通知推送' },
    { key: 'SERVERCHAN_KEY', label: 'Server酱', placeholder: 'SCTxxx', hint: '微信推送' },
    { key: 'WECOM_WEBHOOK_URL', label: '企业微信', placeholder: 'https://qyapi.weixin.qq.com/...', hint: '企微群推送' },
  ]},
  { group: '🤖 AI 模型', items: [
    { key: 'OPENAI_API_KEY', label: 'API Key', placeholder: 'sk-xxx', hint: '不填则用规则引擎' },
    { key: 'OPENAI_BASE_URL', label: '接口地址', placeholder: 'https://api.deepseek.com', hint: '默认 DeepSeek' },
  ]},
];

async function loadConfig() {
  const panel = document.getElementById('config-panel');
  try {
    const res = await fetch(API + '/api/config');
    const data = await res.json();
    renderConfig(data);
  } catch (e) {
    panel.innerHTML = '<div style="font-size:13px;color:var(--text-secondary)">无法加载配置</div>';
  }
}

function renderConfig(data) {
  const panel = document.getElementById('config-panel');
  const html = CONFIG_FIELDS.map(group => {
    const items = group.items.map(f => {
      const info = data[f.key] || {};
      const statusCls = info.has_value ? 'on' : 'off';
      const statusText = info.has_value ? '已配置' : '未配置';
      const displayVal = info.sensitive && info.has_value ? info.value : (info.has_value ? info.value : '');
      return `
        <div class="config-item">
          <div class="config-label">
            <span class="config-label-text">${f.label} <span class="config-label-hint">${f.hint}</span></span>
            <span class="config-status ${statusCls}">${statusText}</span>
          </div>
          <div class="config-input-row">
            <input class="config-input" id="cfg-${f.key}"
              type="${info.sensitive ? 'password' : 'text'}"
              placeholder="${f.placeholder}"
              value="${displayVal}"
              onfocus="onConfigFocus(this, '${f.key}', ${!!info.sensitive})">
            <button class="config-save-btn" onclick="saveConfig('${f.key}')">保存</button>
            ${info.has_value ? `<button class="config-clear-btn" onclick="clearConfig('${f.key}')">清除</button>` : ''}
          </div>
        </div>
      `;
    }).join('');
    return `
      <div class="config-group">
        <div class="config-group-title">${group.group}</div>
        ${items}
      </div>
    `;
  }).join('');

  panel.innerHTML = html;
}

function onConfigFocus(input, key, sensitive) {
  // 敏感字段聚焦时清空脱敏值，让用户重新输入
  if (sensitive && input.value.includes('*')) {
    input.value = '';
    input.type = 'text';
  }
}

async function saveConfig(key) {
  const input = document.getElementById('cfg-' + key);
  const value = input.value.trim();
  if (!value) {
    showToast('请输入值', 'error');
    return;
  }
  // 如果是脱敏值没改，跳过
  if (value.includes('****')) {
    showToast('请输入新值', 'error');
    return;
  }

  try {
    const res = await fetch(API + '/api/config', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ key, value }),
    });
    if (!res.ok) throw new Error('保存失败');
    showToast(`${key} 已保存 ✅`, 'success');
    loadConfig();
  } catch (e) {
    showToast('保存失败: ' + e.message, 'error');
  }
}

async function clearConfig(key) {
  try {
    const res = await fetch(API + '/api/config', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ key, value: '' }),
    });
    if (!res.ok) throw new Error('清除失败');
    showToast(`${key} 已清除`, 'success');
    loadConfig();
  } catch (e) {
    showToast('清除失败: ' + e.message, 'error');
  }
}

async function testPush() {
  const btn = document.getElementById('push-test-btn');
  const result = document.getElementById('push-result');
  btn.disabled = true;
  btn.textContent = '发送中...';
  result.textContent = '';

  try {
    const res = await fetch(API + '/api/push/test', { method: 'POST' });
    const data = await res.json();
    const parts = [];
    if (data.push_results.bark === true) parts.push('Bark ✅');
    else if (data.push_results.bark === false) parts.push('Bark ❌');
    if (data.push_results.serverchan === true) parts.push('Server酱 ✅');
    else if (data.push_results.serverchan === false) parts.push('Server酱 ❌');
    if (data.push_results.wecom === true) parts.push('企业微信 ✅');
    else if (data.push_results.wecom === false) parts.push('企业微信 ❌');

    if (parts.length > 0) {
      result.textContent = '测试结果：' + parts.join('、');
      showToast('测试推送已发送', 'success');
    } else {
      result.textContent = '没有已配置的推送渠道';
      showToast('请先配置推送渠道', 'error');
    }
  } catch (e) {
    result.textContent = '测试失败: ' + e.message;
    showToast('测试失败', 'error');
  } finally {
    btn.disabled = false;
    btn.textContent = '🧪 发送测试推送';
  }
}

// ---- 日志查看 ----
let logsVisible = false;

function toggleLogs() {
  const panel = document.getElementById('logs-panel');
  const btn = document.getElementById('logs-toggle-btn');
  logsVisible = !logsVisible;
  panel.style.display = logsVisible ? 'block' : 'none';
  btn.textContent = logsVisible ? '📋 收起日志' : '📋 查看错误日志';
  if (logsVisible) fetchLogs();
}

async function fetchLogs() {
  const content = document.getElementById('logs-content');
  const countEl = document.getElementById('logs-count');
  const level = document.getElementById('log-level-filter').value;
  content.textContent = '加载中...';
  try {
    const params = new URLSearchParams({ limit: '200' });
    if (level) params.set('level', level);
    const res = await fetch(API + '/api/logs?' + params.toString());
    const data = await res.json();
    if (data.logs.length === 0) {
      content.innerHTML = '<span style="color:var(--text-secondary)">暂无日志</span>';
    } else {
      content.innerHTML = data.logs.map(l => {
        const color = l.level === 'ERROR' ? 'var(--red)' : l.level === 'WARNING' ? 'var(--yellow)' : 'var(--text-secondary)';
        return `<div style="margin-bottom:4px;"><span style="color:${color};font-weight:600;">[${l.level}]</span> <span style="color:var(--text-secondary)">${l.ts}</span>\n${l.msg}</div>`;
      }).join('');
      // 自动滚动到底部
      content.scrollTop = content.scrollHeight;
    }
    countEl.textContent = `显示 ${data.logs.length} 条 / 缓冲区共 ${data.total} 条`;
  } catch (e) {
    content.textContent = '加载失败: ' + e.message;
    countEl.textContent = '';
  }
}

async function clearLogs() {
  try {
    await fetch(API + '/api/logs', { method: 'DELETE' });
    showToast('日志已清空', 'success');
    fetchLogs();
  } catch (e) {
    showToast('清空失败', 'error');
  }
}

// ---- 版本信息 ----
async function loadVersion() {
  const el = document.getElementById('version-info');
  try {
    const res = await fetch(API + '/api/version');
    const v = await res.json();
    const commit = v.git_commit && v.git_commit !== 'unknown' ? v.git_commit.substring(0, 7) : '';
    const time = v.build_time && v.build_time !== 'unknown' ? v.build_time : '';
    const parts = [];
    if (commit) parts.push(commit);
    if (time) parts.push(time);
    el.textContent = parts.length > 0 ? '版本: ' + parts.join(' · ') : '版本: dev';
  } catch (e) {
    el.textContent = '版本信息不可用';
  }
}

// ---- Toast ----
function showToast(msg, type) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.className = 'toast ' + (type || '');
  setTimeout(() => toast.classList.add('show'), 10);
  setTimeout(() => toast.classList.remove('show'), 3000);
}

// ---- Init ----
loadPortfolio();
</script>
