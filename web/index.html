<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💰</text></svg>">
<title>天才交易员</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

html, body {
  overflow: hidden;
  width: 100%;
  height: 100%;
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
}

:root {
  --bg: #faf5f3;
  --card: #ffffff;
  --card-hover: #fef0ed;
  --border: #ecdad6;
  --text: #3d2b2b;
  --text-secondary: #8a7070;
  --accent: #b84e4a;
  --accent-light: #cf6e6a;
  --green: #2e9464;
  --green-bg: rgba(46,148,100,0.10);
  --red: #c94544;
  --red-bg: rgba(201,69,68,0.10);
  --yellow: #b8892e;
  --yellow-bg: rgba(184,137,46,0.10);
}

body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  background: var(--bg);
  color: var(--text);
}

.scroll-wrapper {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  padding-bottom: 100px;
}

.container { max-width: 480px; margin: 0 auto; padding: 0 16px; }

/* Header */
.header {
  padding: 24px 0 16px;
  border-bottom: 1px solid var(--border);
  margin-bottom: 20px;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
}
.header-center { text-align: center; }
.header h1 { font-size: 20px; font-weight: 600; }
.header p { font-size: 13px; color: var(--text-secondary); margin-top: 4px; }
.settings-trigger {
  position: absolute;
  right: 0;
  top: 50%;
  transform: translateY(-50%);
  background: none;
  border: none;
  color: var(--text-secondary);
  font-size: 20px;
  cursor: pointer;
  padding: 6px;
  border-radius: 8px;
  transition: all 0.2s;
  line-height: 1;
}
.settings-trigger:hover { color: var(--text); background: var(--card); }

/* 简报卡片 */
.briefing-card {
  background: linear-gradient(135deg, #fce8e4 0%, #ffffff 100%);
  border: 1px solid #e8c4bf;
  border-radius: 16px;
  padding: 20px;
  margin-bottom: 16px;
  position: relative;
  overflow: hidden;
}
.briefing-card::before {
  content: '';
  position: absolute;
  top: -50%;
  right: -30%;
  width: 200px;
  height: 200px;
  background: radial-gradient(circle, rgba(184,78,74,0.06), transparent);
  border-radius: 50%;
}
.briefing-summary {
  font-size: 22px;
  font-weight: 700;
  margin-bottom: 16px;
  position: relative;
  word-break: break-word;
}
.briefing-market {
  font-size: 13px;
  color: var(--text-secondary);
  line-height: 1.6;
  position: relative;
  word-break: break-word;
}

/* 持仓列表 */
.section-title {
  font-size: 14px;
  font-weight: 600;
  color: var(--text-secondary);
  margin: 20px 0 12px;
  display: flex;
  align-items: center;
  gap: 6px;
}

.fund-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 16px;
  margin-bottom: 10px;
  transition: background 0.2s, border-color 0.2s;
  -webkit-user-select: none;
  user-select: none;
  cursor: pointer;
}
.fund-card:hover { background: var(--card-hover); }
.fund-card.selected {
  border-color: var(--accent);
  background: var(--card-hover);
}

.fund-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 8px;
  gap: 10px;
}
.fund-name { font-size: 15px; font-weight: 600; word-break: break-word; min-width: 0; }
.fund-code { font-size: 12px; color: var(--text-secondary); }

.fund-action {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 4px 10px;
  border-radius: 20px;
  font-size: 13px;
  font-weight: 600;
  white-space: nowrap;
  flex-shrink: 0;
}
.action-buy { background: var(--red-bg); color: var(--red); }
.action-sell { background: var(--green-bg); color: var(--green); }
.action-hold { background: var(--yellow-bg); color: var(--yellow); }

.fund-reason {
  font-size: 13px;
  color: var(--text-secondary);
  line-height: 1.5;
  word-break: break-word;
}
.fund-est {
  display: inline-flex;
  align-items: center;
  gap: 3px;
  font-size: 12px;
  font-weight: 600;
  margin-top: 6px;
  padding: 2px 8px;
  border-radius: 6px;
}
.fund-est.up { background: var(--red-bg); color: var(--red); }
.fund-est.down { background: var(--green-bg); color: var(--green); }
.fund-est.flat { background: rgba(138,112,112,0.10); color: #8a7070; }
.fund-est-label { font-size: 11px; color: var(--text-secondary); font-weight: 400; }
.fund-est-time { font-size: 10px; color: var(--text-secondary); font-weight: 400; margin-left: 2px; }

.fund-delete {
  background: none;
  border: none;
  color: var(--red);
  cursor: pointer;
  font-size: 12px;
  padding: 4px 10px;
  border-radius: 6px;
  display: none;
  transition: background 0.2s;
  background: var(--red-bg);
}
.fund-card.selected .fund-delete { display: inline-block; }
.fund-delete:hover { background: var(--red); color: white; }

/* 吸底输入栏 */
.bottom-input-bar {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  background: var(--card);
  border-top: 1px solid var(--border);
  box-shadow: 0 -8px 24px rgba(0,0,0,0.12);
  padding: 10px 16px;
  padding-bottom: max(10px, env(safe-area-inset-bottom));
  z-index: 800;
}
.bottom-input-bar .input-row {
  display: flex;
  align-items: flex-end;
  gap: 8px;
  max-width: 480px;
  margin: 0 auto;
}
.bottom-input-bar .text-input {
  flex: 1;
  min-height: 40px;
  max-height: 120px;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 10px 16px;
  color: var(--text);
  font-size: 14px;
  resize: none;
  font-family: inherit;
  line-height: 1.4;
  overflow-y: auto;
  scrollbar-width: none;
  -ms-overflow-style: none;
}
.bottom-input-bar .text-input::-webkit-scrollbar { display: none; }
.bottom-input-bar .text-input::placeholder { color: #bca8a8; }
.bottom-input-bar .text-input:focus { outline: none; border-color: var(--accent); }

.bottom-input-bar .icon-btn {
  width: 40px;
  height: 40px;
  border-radius: 50%;
  border: none;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  flex-shrink: 0;
  transition: all 0.2s;
  font-size: 18px;
}
.bottom-input-bar .upload-btn {
  background: var(--bg);
  color: var(--text-secondary);
  border: 1px solid var(--border);
}
.bottom-input-bar .upload-btn:hover { border-color: var(--accent); color: var(--accent); }
.bottom-input-bar .upload-btn.has-file { background: var(--green-bg); color: var(--green); border-color: var(--green); }
.bottom-input-bar .send-btn {
  background: var(--accent);
  color: white;
}
.bottom-input-bar .send-btn:hover { background: var(--accent-light); }
.bottom-input-bar .send-btn:disabled {
  background: #e8d8d5;
  color: #a89090;
  cursor: not-allowed;
}
.bottom-input-bar .file-hint {
  font-size: 11px;
  color: var(--text-secondary);
  text-align: center;
  margin-top: 4px;
  max-width: 480px;
  margin-left: auto;
  margin-right: auto;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.bottom-input-bar .file-hint .clear-file {
  color: var(--red);
  cursor: pointer;
  margin-left: 4px;
}
.bottom-input-bar input[type="file"] { display: none; }

/* 生成按钮 */
.generate-area {
  margin-top: 16px;
  display: flex;
  align-items: center;
  gap: 12px;
}
.generate-btn {
  flex: 1;
  padding: 14px;
  background: linear-gradient(135deg, var(--accent), #c47a4a);
  color: white;
  border: none;
  border-radius: 12px;
  font-size: 16px;
  font-weight: 600;
  cursor: pointer;
  transition: transform 0.1s, box-shadow 0.2s;
  box-shadow: 0 4px 16px rgba(184,78,74,0.3);
}
.generate-btn:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(184,78,74,0.4); }
.generate-btn:active { transform: translateY(0); }
.generate-btn:disabled {
  background: #e8d8d5;
  box-shadow: none;
  cursor: not-allowed;
  transform: none;
}
.push-toggle {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 12px;
  color: var(--text-secondary);
  white-space: nowrap;
  flex-shrink: 0;
}
.push-toggle label {
  cursor: pointer;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
}
.toggle-switch {
  position: relative;
  width: 36px;
  height: 20px;
  appearance: none;
  -webkit-appearance: none;
  background: var(--border);
  border-radius: 10px;
  cursor: pointer;
  transition: background 0.2s;
  outline: none;
}
.toggle-switch:checked { background: var(--accent); }
.toggle-switch::before {
  content: '';
  position: absolute;
  top: 2px;
  left: 2px;
  width: 16px;
  height: 16px;
  background: white;
  border-radius: 50%;
  transition: transform 0.2s;
}
.toggle-switch:checked::before { transform: translateX(16px); }

/* Loading */
.loading {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  padding: 40px;
  color: var(--text-secondary);
  font-size: 14px;
}
.spinner {
  width: 20px;
  height: 20px;
  border: 2px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* Toast */
.toast {
  position: fixed;
  top: 20px;
  left: 50%;
  transform: translateX(-50%) translateY(-100px);
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 12px 20px;
  font-size: 14px;
  z-index: 1000;
  transition: transform 0.3s ease;
  box-shadow: 0 8px 30px rgba(0,0,0,0.1);
}
.toast.show { transform: translateX(-50%) translateY(0); }
.toast.success { border-color: var(--green); }
.toast.error { border-color: var(--red); }

/* Empty state */
.empty-state {
  text-align: center;
  padding: 40px 20px;
  color: var(--text-secondary);
}
.empty-state-icon { font-size: 48px; margin-bottom: 12px; }
.empty-state-text { font-size: 14px; line-height: 1.6; }

/* 设置抽屉 */
.drawer-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.5);
  z-index: 900;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.3s;
}
.drawer-overlay.open { opacity: 1; pointer-events: auto; }

.drawer {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  max-height: 85vh;
  background: var(--card);
  border-top-left-radius: 20px;
  border-top-right-radius: 20px;
  z-index: 901;
  transform: translateY(100%);
  transition: transform 0.3s ease;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
.drawer.open { transform: translateY(0); }

.drawer-handle {
  display: flex;
  justify-content: center;
  padding: 10px 0 4px;
  cursor: grab;
  flex-shrink: 0;
}
.drawer-handle-bar {
  width: 36px;
  height: 4px;
  background: var(--border);
  border-radius: 2px;
}

.drawer-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 4px 20px 12px;
  flex-shrink: 0;
}
.drawer-header h3 { font-size: 16px; font-weight: 600; }
.drawer-close {
  background: none;
  border: none;
  color: var(--text-secondary);
  font-size: 22px;
  cursor: pointer;
  padding: 4px 8px;
  border-radius: 8px;
  line-height: 1;
}
.drawer-close:hover { color: var(--text); background: var(--bg); }

.drawer-body {
  overflow-y: auto;
  padding: 0 20px 24px;
  -webkit-overflow-scrolling: touch;
}

.settings-desc {
  font-size: 12px;
  color: var(--text-secondary);
  margin-bottom: 14px;
}
.config-group {
  margin-bottom: 16px;
}
.config-group:last-child { margin-bottom: 0; }
.config-group-title {
  font-size: 12px;
  font-weight: 600;
  color: var(--accent-light);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-bottom: 10px;
}
.config-item {
  margin-bottom: 10px;
}
.config-label {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 4px;
}
.config-label-text {
  font-size: 13px;
  color: var(--text);
}
.config-label-hint {
  font-size: 11px;
  color: var(--text-secondary);
}
.config-status {
  font-size: 11px;
  padding: 1px 6px;
  border-radius: 10px;
}
.config-status.on { background: var(--green-bg); color: var(--green); }
.config-status.off { background: rgba(138,112,112,0.10); color: #a89090; }
.config-input-row {
  display: flex;
  gap: 6px;
}
.config-input {
  flex: 1;
  min-width: 0;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 8px 10px;
  color: var(--text);
  font-size: 13px;
  font-family: "SF Mono", "Menlo", monospace;
}
.config-input::placeholder { color: #bca8a8; }
.config-input:focus { outline: none; border-color: var(--accent); }
.config-save-btn {
  padding: 8px 12px;
  background: var(--accent);
  color: white;
  border: none;
  border-radius: 8px;
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  white-space: nowrap;
  transition: background 0.2s;
  flex-shrink: 0;
}
.config-save-btn:hover { background: var(--accent-light); }
.config-save-btn:disabled { background: #e8d8d5; color: #a89090; cursor: not-allowed; }
.push-test-btn {
  background: transparent;
  border: 1px solid var(--accent);
  color: var(--accent);
  padding: 8px 14px;
  border-radius: 8px;
  font-size: 13px;
  cursor: pointer;
  margin-top: 14px;
  transition: all 0.2s;
}
.push-test-btn:hover { background: var(--accent); color: white; }
.push-test-btn:disabled { opacity: 0.5; cursor: not-allowed; }
.push-result {
  margin-top: 8px;
  font-size: 13px;
  color: var(--text-secondary);
}
.divider {
  border: none;
  border-top: 1px solid var(--border);
  margin: 14px 0;
}

/* 推送时间设置 */
.schedule-section {
  margin-top: 4px;
}
.schedule-row {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-top: 8px;
}
.schedule-row input[type="time"] {
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 8px 12px;
  color: var(--text);
  font-size: 15px;
  font-family: inherit;
  flex: 1;
  min-width: 0;
}
.schedule-row input[type="time"]:focus { outline: none; border-color: var(--accent); }
.schedule-save-btn {
  padding: 8px 14px;
  background: var(--accent);
  color: white;
  border: none;
  border-radius: 8px;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  white-space: nowrap;
  flex-shrink: 0;
  transition: background 0.2s;
}
.schedule-save-btn:hover { background: var(--accent-light); }
.schedule-save-btn:disabled { background: #e8d8d5; color: #a89090; cursor: not-allowed; }
.schedule-info {
  font-size: 12px;
  color: var(--text-secondary);
  margin-top: 6px;
}
.schedule-disable-btn {
  background: transparent;
  border: 1px solid var(--border);
  color: var(--text-secondary);
  padding: 8px 10px;
  border-radius: 8px;
  font-size: 12px;
  cursor: pointer;
  flex-shrink: 0;
  transition: all 0.2s;
}
.schedule-disable-btn:hover { border-color: var(--red); color: var(--red); }

/* 基金操作按钮组 */
.fund-actions {
  display: none;
  gap: 6px;
  margin-top: 8px;
  flex-wrap: wrap;
}
.fund-card.selected .fund-actions { display: flex; }
.fund-action-btn {
  padding: 5px 12px;
  border-radius: 8px;
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  border: 1px solid var(--border);
  background: var(--bg);
  color: var(--text-secondary);
  transition: all 0.2s;
}
.fund-action-btn:hover { border-color: var(--accent); color: var(--accent); }
.fund-action-btn.buy { border-color: var(--red); color: var(--red); background: var(--red-bg); }
.fund-action-btn.buy:hover { background: var(--red); color: white; }
.fund-action-btn.sell { border-color: var(--green); color: var(--green); background: var(--green-bg); }
.fund-action-btn.sell:hover { background: var(--green); color: white; }
.fund-action-btn.invest { border-color: var(--accent); color: var(--accent); }
.fund-action-btn.invest:hover { background: var(--accent); color: white; }
.fund-action-btn.delete { border-color: var(--red); color: var(--red); background: var(--red-bg); }
.fund-action-btn.delete:hover { background: var(--red); color: white; }

/* 交易/定投弹窗 */
.trade-drawer { z-index: 902; }
.trade-drawer-overlay { z-index: 901; }
.trade-form { padding: 0; }
.trade-form .form-group { margin-bottom: 16px; }
.trade-form .form-label {
  font-size: 13px;
  color: var(--text-secondary);
  margin-bottom: 6px;
  display: block;
}
.trade-form .form-input {
  width: 100%;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 12px 14px;
  color: var(--text);
  font-size: 16px;
  font-family: inherit;
}
.trade-form .form-input:focus { outline: none; border-color: var(--accent); }
.quick-amounts {
  display: flex;
  gap: 8px;
  margin-top: 8px;
  flex-wrap: wrap;
}
.quick-amount {
  padding: 6px 14px;
  border-radius: 20px;
  border: 1px solid var(--border);
  background: var(--bg);
  color: var(--text);
  font-size: 13px;
  cursor: pointer;
  transition: all 0.2s;
}
.quick-amount:hover, .quick-amount.active {
  border-color: var(--accent);
  background: var(--accent);
  color: white;
}
.trade-info {
  background: var(--bg);
  border-radius: 10px;
  padding: 12px;
  font-size: 13px;
  color: var(--text-secondary);
  line-height: 1.8;
}
.trade-info strong { color: var(--text); font-weight: 600; }
.trade-submit {
  width: 100%;
  padding: 14px;
  border: none;
  border-radius: 12px;
  font-size: 16px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
  margin-top: 8px;
}
.trade-submit.buy-btn {
  background: var(--red);
  color: white;
}
.trade-submit.buy-btn:hover { opacity: 0.9; }
.trade-submit.sell-btn {
  background: var(--green);
  color: white;
}
.trade-submit.sell-btn:hover { opacity: 0.9; }
.trade-submit.invest-btn {
  background: linear-gradient(135deg, var(--accent), #c47a4a);
  color: white;
  box-shadow: 0 4px 16px rgba(184,78,74,0.3);
}
.trade-submit:disabled {
  background: #e8d8d5;
  color: #a89090;
  cursor: not-allowed;
  box-shadow: none;
}
.form-hint {
  font-size: 12px;
  color: var(--text-secondary);
  margin-top: 4px;
}
.form-error {
  font-size: 12px;
  color: var(--red);
  margin-top: 4px;
}

/* 定投频率选择 */
.freq-row {
  display: flex;
  gap: 8px;
}
.freq-select {
  flex: 1;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 10px 12px;
  color: var(--text);
  font-size: 14px;
  font-family: inherit;
  appearance: auto;
}
.freq-select:focus { outline: none; border-color: var(--accent); }

/* 定投管理区域 */
.invest-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 14px 16px;
  margin-bottom: 10px;
}
.invest-card-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 6px;
}
.invest-card-name { font-size: 14px; font-weight: 600; }
.invest-card-schedule { font-size: 13px; color: var(--text-secondary); }
.invest-card-status {
  font-size: 12px;
  color: var(--text-secondary);
  display: flex;
  align-items: center;
  gap: 6px;

<script>
const API = '';  // 同源，无需前缀
const PORTFOLIO_KEY = 'fund_assistant_portfolio';  // localStorage key
const CONFIG_KEY = 'fund_assistant_config';  // localStorage key for config
const TX_KEY = 'fund_assistant_transactions';  // 交易流水
const INVEST_KEY = 'fund_assistant_auto_invest';  // 定投计划

// ---- 本地配置存取 ----
function getLocalConfig() {
  try {
    const data = localStorage.getItem(CONFIG_KEY);
    return data ? JSON.parse(data) : {};
  } catch (e) {
    return {};
  }
}

function saveLocalConfig(config) {
  try {
    localStorage.setItem(CONFIG_KEY, JSON.stringify(config));
  } catch (e) {
    console.error('保存配置失败:', e);
  }
}

function getConfigValue(key) {
  return getLocalConfig()[key] || '';
}

function setConfigValue(key, value) {
  const config = getLocalConfig();
  if (value) {
    config[key] = value;
  } else {
    delete config[key];
  }
  saveLocalConfig(config);
}

// 获取推送相关配置（用于传给后端）
function getPushConfig() {
  const cfg = getLocalConfig();
  const push = {};
  if (cfg.BARK_URL) push.BARK_URL = cfg.BARK_URL;
  if (cfg.SERVERCHAN_KEY) push.SERVERCHAN_KEY = cfg.SERVERCHAN_KEY;
  if (cfg.WECOM_WEBHOOK_URL) push.WECOM_WEBHOOK_URL = cfg.WECOM_WEBHOOK_URL;
  return push;
}

// ---- 本地存储工具 ----
function getLocalPortfolio() {
  try {
    const data = localStorage.getItem(PORTFOLIO_KEY);
    return data ? JSON.parse(data) : [];
  } catch (e) {
    console.error('读取本地持仓失败:', e);
    return [];
  }
}

function saveLocalPortfolio(holdings) {
  try {
    localStorage.setItem(PORTFOLIO_KEY, JSON.stringify(holdings));
  } catch (e) {
    console.error('保存本地持仓失败:', e);
  }
}

// ---- 简报 ----
async function generateBriefing() {
  const withPush = document.getElementById('push-switch').checked;
  const btn = document.getElementById('generate-btn');
  btn.disabled = true;
  btn.textContent = withPush ? '⏳ 生成并推送中...' : '⏳ 分析中...（约10秒）';

  const area = document.getElementById('briefing-area');
  area.innerHTML = '<div class="loading"><div class="spinner"></div>Agent 正在分析...</div>';

  // 将本地持仓传给后端
  const localHoldings = getLocalPortfolio();
  if (localHoldings.length === 0) {
    area.innerHTML = '<div class="empty-state"><div class="empty-state-icon">📂</div><div class="empty-state-text">请先添加持仓再生成简报</div></div>';
    btn.disabled = false;
    btn.textContent = '⚡ 生成今日简报';
    showToast('请先添加持仓', 'error');
    return;
  }

  const endpoint = withPush ? '/api/briefing-and-push' : '/api/briefing';

  try {
    const reqBody = { holdings: localHoldings };
    if (withPush) reqBody.config = getPushConfig();

    const res = await fetch(API + endpoint, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(reqBody),
    });
    if (!res.ok) throw new Error('服务器返回 ' + res.status);
    const data = await res.json();
    renderBriefing(data.raw);

    if (withPush && data.push_results) {
      const pushMsg = formatPushResults(data.push_results);
      showToast('简报已生成 ' + pushMsg, 'success');
    } else {
      showToast('简报已生成 ✅', 'success');
    }
  } catch (e) {
    area.innerHTML = '<div class="empty-state"><div class="empty-state-icon">😵</div><div class="empty-state-text">生成失败，请重试</div></div>';
    showToast('生成失败: ' + e.message, 'error');
  } finally {
    btn.disabled = false;
    btn.textContent = '⚡ 生成今日简报';
  }
}

function formatPushResults(results) {
  const parts = [];
  if (results.bark === true) parts.push('Bark✅');
  else if (results.bark === false) parts.push('Bark❌');
  if (results.serverchan === true) parts.push('微信✅');
  else if (results.serverchan === false) parts.push('微信❌');
  if (results.wecom === true) parts.push('企微✅');
  else if (results.wecom === false) parts.push('企微❌');
  return parts.length > 0 ? '| 推送: ' + parts.join(' ') : '✅';
}

function renderBriefing(briefing) {
  const area = document.getElementById('briefing-area');
  const details = briefing.details || [];

  let fundsHtml = details.map(d => {
    const cls = d.action === '加仓' ? 'action-buy' : d.action === '减仓' ? 'action-sell' : 'action-hold';
    const emoji = d.action === '加仓' ? '🟢' : d.action === '减仓' ? '🔴' : '⏸️';
    return `
      <div class="fund-card">
        <div class="fund-header">
          <div>
            <div class="fund-name">${d.fund_name}</div>
          </div>
          <div class="fund-action ${cls}">${emoji} ${d.action}</div>
        </div>
        <div class="fund-reason">${d.reason || ''}</div>
      </div>
    `;
  }).join('');

  area.innerHTML = `
    <div class="briefing-card">
      <div class="briefing-summary">💡 ${briefing.summary || '暂无建议'}</div>
      <div class="briefing-market">${briefing.market_note || ''}</div>
    </div>
    ${fundsHtml}
  `;
}

// ---- 持仓 ----
// 前端估值缓存：{fund_code: {est_change, est_nav, est_time, is_live}}
let estimationCache = {};

function loadPortfolio(skipEstimation) {
  const holdings = getLocalPortfolio();
  renderPortfolio(holdings);
  if (holdings.length > 0) {
    // 刷新最新净值和市值
    refreshPortfolioNav(holdings);
    if (!skipEstimation) {
      loadEstimation(holdings);
    }
  }
}

async function refreshPortfolioNav(holdings) {
  try {
    const res = await fetch(API + '/api/portfolio/refresh', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ holdings }),
    });
    if (!res.ok) return;
    const data = await res.json();
    if (data.holdings && data.holdings.length > 0) {
      // 用最新数据更新本地存储
      const localMap = {};
      for (const h of getLocalPortfolio()) {
        localMap[h.fund_code] = h;
      }
      for (const h of data.holdings) {
        if (h.fund_code && localMap[h.fund_code]) {
          // 更新净值相关字段，保留用户原始的 cost
          localMap[h.fund_code].current_nav = h.current_nav;
          localMap[h.fund_code].profit_ratio = h.profit_ratio;
          localMap[h.fund_code].market_value = h.market_value;
          localMap[h.fund_code].trend_5d = h.trend_5d;
        }
      }
      const updated = Object.values(localMap);
      saveLocalPortfolio(updated);
      renderPortfolio(updated);
    }
  } catch (e) { /* silent */ }
}

function renderPortfolio(holdings) {
  const list = document.getElementById('portfolio-list');
  const title = document.getElementById('portfolio-title');

  if (!holdings || holdings.length === 0) {
    title.style.display = 'none';
    list.innerHTML = '';
    return;
  }

  const allTx = getTransactions();
  const allPlans = getInvestPlans();

  title.style.display = 'flex';
  list.innerHTML = holdings.map(h => {
    const cost = h.total_cost || h.cost || 0;
    const mv = h.market_value || cost;
    const ratio = h.profit_ratio || 0;
    const shares = h.total_shares || 0;
    const avgNav = h.avg_nav || 0;
    const profit = mv - cost;
    const profitSign = profit >= 0 ? '+' : '';
    const ratioSign = ratio >= 0 ? '+' : '';
    const profitColor = profit > 0 ? 'var(--red)' : profit < 0 ? 'var(--green)' : 'var(--text-secondary)';
    const txCount = h.transaction_count || allTx.filter(t => t.fund_code === h.fund_code).length;
    const plan = allPlans.find(p => p.fund_code === h.fund_code && p.status === 'active');
    const investTag = plan ? `<div class="fund-invest-tag">定投中 · ${formatFrequency(plan)} ¥${plan.amount}</div>` : '';

    return `
    <div class="fund-card" onclick="toggleFundSelect(this)">
      <div class="fund-header">
        <div>
          <span class="fund-name">${h.fund_name || '未知'}</span>
          <span class="fund-code">${h.fund_code || ''}</span>
        </div>
      </div>
      <div class="fund-reason">
        ${cost ? '累计投入 ¥' + cost.toLocaleString() : ''}
        ${mv !== cost ? ' → 市值 ¥' + mv.toLocaleString() : ''}
        ${ratio ? ' · <span style="color:' + profitColor + ';font-weight:600">' + ratioSign + ratio + '%</span>' : ''}
        ${profit && cost ? ' · <span style="color:' + profitColor + '">' + profitSign + profit.toFixed(0) + '元</span>' : ''}
      </div>
      ${shares ? '<div class="fund-reason" style="margin-top:2px">持有 ' + shares.toFixed(2) + ' 份 · 均价 ' + avgNav.toFixed(4) + '</div>' : ''}
      <div id="est-${h.fund_code}"></div>
      ${investTag}
      <div class="fund-actions">
        <button class="fund-action-btn buy" onclick="event.stopPropagation(); openTradeDrawer('${h.fund_code}', 'buy')">加仓</button>
        <button class="fund-action-btn sell" onclick="event.stopPropagation(); openTradeDrawer('${h.fund_code}', 'sell')">减仓</button>
        <button class="fund-action-btn invest" onclick="event.stopPropagation(); openInvestDrawer('${h.fund_code}')">定投</button>
        <button class="fund-action-btn delete" onclick="event.stopPropagation(); deleteHolding('${h.fund_code}')">删除</button>
      </div>
      ${txCount > 0 ? '<span class="tx-toggle" onclick="event.stopPropagation(); toggleTxList(this, \'' + h.fund_code + '\')">交易记录 ' + txCount + '笔</span>' : ''}
      <div class="tx-list" id="tx-list-${h.fund_code}" style="display:none"></div>
    </div>
  `;}).join('');

  // 立即用缓存的估值数据填充 DOM
  applyEstimationCache(holdings);
}

function applyEstimationCache(holdings) {
  for (const h of holdings) {
    const f = estimationCache[h.fund_code];
    if (!f) continue;
    renderSingleEstimation(h.fund_code, f);
  }
}

function renderSingleEstimation(fund_code, f) {
  const el = document.getElementById('est-' + fund_code);
  if (!el || f.est_change === null || f.est_change === undefined) return;
  if (f.est_time === '暂无数据') {
    el.innerHTML = `<span class="fund-est flat"><span class="fund-est-label">暂无估值数据</span></span>`;
    return;
  }
  const cls = f.est_change > 0.05 ? 'up' : f.est_change < -0.05 ? 'down' : 'flat';
  const sign = f.est_change > 0 ? '+' : '';
  if (f.is_live) {
    el.innerHTML = `<span class="fund-est ${cls}">` +
      `<span class="fund-est-label">盘中估值</span> ${sign}${f.est_change.toFixed(2)}%` +
      (f.est_time ? ` <span class="fund-est-time">${f.est_time}</span>` : '') +
      `</span>`;
  } else {
    el.innerHTML = `<span class="fund-est ${cls}">` +
      `<span class="fund-est-label">${f.est_time || '上日收盘'}</span> ${sign}${f.est_change.toFixed(2)}%` +
      `</span>`;
  }
}

async function loadEstimation(holdings) {
  if (!holdings || holdings.length === 0) return;
  try {
    const res = await fetch(API + '/api/estimation', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ holdings }),
    });
    const data = await res.json();
    for (const f of data.funds) {
      // 更新前端缓存
      estimationCache[f.fund_code] = f;
      renderSingleEstimation(f.fund_code, f);
    }
  } catch (e) { /* silent */ }
}

async function addFromText() {
  const input = document.getElementById('text-input');
  const text = input.value.trim();
  if (!text) return;

  const btn = document.getElementById('send-btn');
  btn.disabled = true;

  try {
    // 调用后端解析自然语言，但不保存到服务器
    const res = await fetch(API + '/api/portfolio/parse-text', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ text }),
    });
    if (!res.ok) {
      const errText = await res.text();
      throw new Error(errText || '服务器返回 ' + res.status);
    }
    const data = await res.json();
    if (data.parsed && data.parsed.length > 0) {
      let tradeDone = false;
      let addedCount = 0;

      for (const h of data.parsed) {
        if (h.intent === 'buy' || h.intent === 'sell') {
          // 加仓/减仓操作：确保持仓存在
          const existing = getLocalPortfolio();
          const fund = existing.find(f => f.fund_code === h.fund_code || f.fund_name === h.fund_name);
          if (fund) {
            // 获取最新净值
            let nav = fund.current_nav || 0;
            if (!nav) {
              try {
                const rr = await fetch(API + '/api/portfolio/refresh', {
                  method: 'POST',
                  headers: { 'Content-Type': 'application/json' },
                  body: JSON.stringify({ holdings: [{ fund_code: fund.fund_code }] }),
                });
                const rd = await rr.json();
                if (rd.holdings && rd.holdings[0]) nav = rd.holdings[0].current_nav || 1;
              } catch(e) { nav = 1; }
            }
            const amount = h.amount || h.cost || 0;
            if (amount > 0) {
              const tx = {
                id: Date.now() + '_' + Math.random().toString(36).slice(2, 8),
                fund_code: fund.fund_code,
                type: h.intent,
                amount: amount,
                nav: Math.round(nav * 10000) / 10000,
                shares: Math.round((amount / nav) * 100) / 100,
                source: 'manual',
                created_at: new Date().toISOString(),
                note: '自然语言录入',
              };
              addTransaction(tx);
              recalcHolding(fund.fund_code);
              tradeDone = true;
            }
          } else {
            showToast(`未找到持仓: ${h.fund_name || h.fund_code}，请先添加`, 'error');
          }
        } else {
          // 新增持仓
          const existing = getLocalPortfolio();
          const existingMap = {};
          for (const f of existing) {
            const key = f.fund_code || f.fund_name || '';
            if (key) existingMap[key] = f;
          }
          const key = h.fund_code || h.fund_name || '';
          if (key) existingMap[key] = h;
          const merged = Object.values(existingMap);
          saveLocalPortfolio(merged);
          addedCount++;
        }
      }

      if (tradeDone) {
        showToast('交易操作已完成 ✅', 'success');
      } else if (addedCount > 0) {
        showToast(`成功添加 ${addedCount} 只基金 ✅`, 'success');
      }

      input.value = '';
      autoGrow(input);
      const newCodes = data.parsed.filter(h => h.intent === 'add_holding' || !h.intent).map(h => h.fund_code).filter(Boolean);
      loadPortfolio(true);
      if (newCodes.length > 0) loadEstimationForNew(newCodes);
    } else {
      showToast('未识别到基金信息，换个描述试试', 'error');
    }
  } catch (e) {
    showToast('识别失败: ' + e.message, 'error');
  } finally {
    toggleSend();
  }
}

async function addFromScreenshot() {
  if (!pendingFile) return;

  const btn = document.getElementById('send-btn');
  btn.disabled = true;

  try {
    const form = new FormData();
    form.append('file', pendingFile);
    const text = document.getElementById('text-input').value.trim();
    if (text) form.append('text', text);
    // 调用后端解析截图，但不保存到服务器
    const res = await fetch(API + '/api/portfolio/parse-screenshot', {
      method: 'POST',
      body: form,
    });
    if (!res.ok) {
      const errText = await res.text();
      throw new Error(errText || '服务器返回 ' + res.status);
    }
    const data = await res.json();
    if (data.parsed && data.parsed.length > 0) {
      // 保存到本地 localStorage
      const existing = getLocalPortfolio();
      const existingMap = {};
      for (const f of existing) {
        const key = f.fund_code || f.fund_name || '';
        if (key) existingMap[key] = f;
      }
      for (const h of data.parsed) {
        const key = h.fund_code || h.fund_name || '';
        if (key) existingMap[key] = h;
      }
      const merged = Object.values(existingMap);
      saveLocalPortfolio(merged);

      showToast(`成功添加 ${data.parsed.length} 只基金 ✅`, 'success');
      document.getElementById('text-input').value = '';
      autoGrow(document.getElementById('text-input'));
      clearFile();
      const newCodes = data.parsed.map(h => h.fund_code).filter(Boolean);
      loadPortfolio(true); // 跳过全量估值
      loadEstimationForNew(newCodes); // 只拉新基金估值
    } else {
      showToast('未识别到基金信息，换张截图试试', 'error');
    }
  } catch (e) {
    showToast('识别失败: ' + e.message, 'error');
  } finally {
    toggleSend();
  }
}

const CONFIG_FIELDS = [

    { key: 'OPENAI_BASE_URL', label: '接口地址', placeholder: 'https://api.deepseek.com', hint: '默认 DeepSeek', sensitive: false },
  ]},
];

function loadConfig() {
  const config = getLocalConfig();
  renderConfig(config);
}

function renderConfig(config) {
  const panel = document.getElementById('config-panel');
  const html = CONFIG_FIELDS.map(group => {
    const items = group.items.map(f => {
      const value = config[f.key] || '';
      const hasValue = !!value;
      const statusCls = hasValue ? 'on' : 'off';
      const statusText = hasValue ? '已配置' : '未配置';
      const displayVal = f.sensitive && hasValue ? maskValue(value) : value;
      return `
        <div class="config-item">
          <div class="config-label">
            <span class="config-label-text">${f.label} <span class="config-label-hint">${f.hint}</span></span>
            <span class="config-status ${statusCls}">${statusText}</span>
          </div>
          <div class="config-input-row">
            <input class="config-input" id="cfg-${f.key}"
              type="${f.sensitive ? 'password' : 'text'}"
              placeholder="${f.placeholder}"
              value="${displayVal}"
              data-original="${displayVal}"
              onfocus="onConfigFocus(this, '${f.key}', ${!!f.sensitive})"
              oninput="onConfigInput('${f.key}')">
            <button class="config-save-btn" id="cfg-btn-${f.key}" onclick="saveConfig('${f.key}')" ${hasValue ? 'disabled' : ''}>保存</button>
          </div>
        </div>
      `;
    }).join('');
    return `
      <div class="config-group">
        <div class="config-group-title">${group.group}</div>
        ${items}
      </div>
    `;
  }).join('');

  panel.innerHTML = html;
}

function maskValue(val) {
  if (!val) return '';
  if (val.length <= 8) return '*'.repeat(val.length);
  return val.slice(0, 3) + '*'.repeat(val.length - 6) + val.slice(-3);
}

function onConfigFocus(input, key, sensitive) {
  if (sensitive && input.value.includes('*')) {
    input.value = '';
    input.type = 'text';
    input.dataset.original = '';
    onConfigInput(key);
  }
}

function onConfigInput(key) {
  const input = document.getElementById('cfg-' + key);
  const btn = document.getElementById('cfg-btn-' + key);
  if (!input || !btn) return;
  const current = input.value.trim();
  const original = input.dataset.original || '';
  btn.disabled = !current || current === original;
}

function saveConfig(key) {
  const input = document.getElementById('cfg-' + key);
  const value = input.value.trim();
  if (!value) {
    showToast('请输入值', 'error');
    return;
  }
  if (value.includes('****')) {
    showToast('请输入新值', 'error');
    return;
  }
  setConfigValue(key, value);
  showToast(`${key} 已保存 ✅`, 'success');
  loadConfig();
}

// ---- 累积持仓计算 ----
function recalcHolding(fundCode) {
  const txs = getTransactions().filter(t => t.fund_code === fundCode);
  let totalShares = 0, totalCost = 0;
  // 按时间正序处理
  const sorted = [...txs].reverse();
  for (const t of sorted) {
    if (t.type === 'buy') {
      totalShares += t.shares || 0;
      totalCost += t.amount || 0;
    } else if (t.type === 'sell') {
      const sellShares = t.shares || 0;
      if (totalShares > 0) {
        const costPerShare = totalCost / totalShares;
        totalCost -= costPerShare * sellShares;
        totalShares -= sellShares;
      }
    }
  }
  totalShares = Math.max(0, totalShares);
  totalCost = Math.max(0, totalCost);
  const avgNav = totalShares > 0 ? totalCost / totalShares : 0;

  // 更新持仓
  const holdings = getLocalPortfolio();
  const h = holdings.find(x => x.fund_code === fundCode);
  if (h) {
    h.total_shares = Math.round(totalShares * 100) / 100;
    h.total_cost = Math.round(totalCost * 100) / 100;
    h.avg_nav = Math.round(avgNav * 10000) / 10000;
    h.cost = h.total_cost;
    h.cost_nav = h.avg_nav;
    h.transaction_count = txs.length;
    saveLocalPortfolio(holdings);
  }
  return { totalShares, totalCost, avgNav };
}

  const submitEl = document.getElementById('trade-submit');

  if (tradeContext.type === 'sell' && amount > tradeContext.marketValue && tradeContext.marketValue > 0) {
    errEl.textContent = '金额不能超过当前市值 ¥' + tradeContext.marketValue.toLocaleString();
    errEl.style.display = 'block';
    submitEl.disabled = true;
  } else {
    errEl.style.display = 'none';
    submitEl.disabled = amount <= 0;
  }
  updateTradeInfo();
}

function updateTradeInfo() {
  const amount = parseFloat(document.getElementById('trade-amount').value) || 0;
  const nav = tradeContext.currentNav;
  const infoEl = document.getElementById('trade-info');

  let html = `成交净值：<strong>${nav ? nav.toFixed(4) : '获取中...'}</strong>（最新净值）<br>`;
  if (nav > 0 && amount > 0) {
    const shares = amount / nav;
    html += `预估份额：<strong>${shares.toFixed(2)}</strong> 份`;
  }
  if (tradeContext.type === 'sell') {
    html += `<br>当前持有：<strong>${(tradeContext.totalShares || 0).toFixed(2)}</strong> 份`;
    html += `<br>当前市值：<strong>¥${(tradeContext.marketValue || 0).toLocaleString()}</strong>`;
  }
  infoEl.innerHTML = html;
}

async function submitTrade() {
  const amount = parseFloat(document.getElementById('trade-amount').value) || 0;
  if (amount <= 0) return;

  const submitEl = document.getElementById('trade-submit');
  submitEl.disabled = true;
  submitEl.textContent = '处理中...';

  let nav = tradeContext.currentNav;
  // 如果没有净值，尝试获取
  if (!nav || nav <= 0) {
    try {
      const holdings = [{ fund_code: tradeContext.fundCode }];
      const res = await fetch(API + '/api/portfolio/refresh', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ holdings }),
      });
      const data = await res.json();
      if (data.holdings && data.holdings[0]) {
        nav = data.holdings[0].current_nav || 1;
      }
    } catch(e) { nav = 1; }
  }

  const shares = amount / nav;
  const tx = {
    id: Date.now() + '_' + Math.random().toString(36).slice(2, 8),
    fund_code: tradeContext.fundCode,
    type: tradeContext.type,
    amount: Math.round(amount * 100) / 100,
    nav: Math.round(nav * 10000) / 10000,
    shares: Math.round(shares * 100) / 100,
    source: 'manual',
    created_at: new Date().toISOString(),
    note: document.getElementById('trade-note').value.trim(),
  };

  addTransaction(tx);
  recalcHolding(tradeContext.fundCode);

  closeTradeDrawer();
  showToast(`${tradeContext.type === 'buy' ? '加仓' : '减仓'}成功 ${tradeContext.type === 'buy' ? '+' : '-'}¥${amount}`, 'success');
  loadPortfolio(true);
}

// ---- 交易记录展示 ----
function toggleTxList(el, fundCode) {
  const listEl = document.getElementById('tx-list-' + fundCode);
  if (!listEl) return;
  if (listEl.style.display === 'none') {
    const txs = getTransactions().filter(t => t.fund_code === fundCode);
    const show = txs.slice(0, 5);
    let html = show.map(t => {
      const d = new Date(t.created_at);
      const dateStr = (d.getMonth()+1).toString().padStart(2,'0') + '-' + d.getDate().toString().padStart(2,'0');
      const srcLabel = t.source === 'auto_invest' ? '📅定投' : '手动';
      const typeCls = t.type === 'buy' ? 'tx-type-buy' : 'tx-type-sell';
      const typeLabel = t.type === 'buy' ? '买入' : '卖出';
      return `<div class="tx-item">
        <span class="tx-date">${dateStr}</span>
        <span class="tx-source">${srcLabel}</span>
        <span class="${typeCls}">${typeLabel} ¥${t.amount}</span>
        <span class="tx-nav">${t.nav ? t.nav.toFixed(4) : '-'}</span>
      </div>`;
    }).join('');
    if (txs.length > 5) {
      html += `<div style="text-align:center;margin-top:6px;"><span class="tx-toggle" onclick="event.stopPropagation(); showAllTx('${fundCode}')">查看全部 ${txs.length} 笔</span></div>`;
    }
    listEl.innerHTML = html;
    listEl.style.display = 'block';
    el.textContent = '📋 收起记录';
  } else {
    listEl.style.display = 'none';
    const txCount = getTransactions().filter(t => t.fund_code === fundCode).length;
    el.textContent = '📋 交易记录 ' + txCount + '笔';
  }
}

function showAllTx(fundCode) {

  const txs = getTransactions().filter(t => t.fund_code === fundCode);

    const d = new Date(t.created_at);
    const dateStr = (d.getMonth()+1).toString().padStart(2,'0') + '-' + d.getDate().toString().padStart(2,'0');
    const srcLabel = t.source === 'auto_invest' ? '📅定投' : '手动';
    const typeCls = t.type === 'buy' ? 'tx-type-buy' : 'tx-type-sell';

      <span class="tx-date">${dateStr}</span>
      <span class="tx-source">${srcLabel}</span>
      <span class="${typeCls}">${typeLabel} ¥${t.amount}</span>
      <span class="tx-nav">${t.nav ? t.nav.toFixed(4) : '-'}</span>
    </div>`;

}

// ---- 定投弹窗逻辑 ----
let investContext = { fundCode: '', fundName: '' };

function openInvestDrawer(fundCode) {
  const holdings = getLocalPortfolio();
  const h = holdings.find(x => x.fund_code === fundCode);
  if (!h) return;

  // 检查是否已有 active 计划
  const existing = getInvestPlans().find(p => p.fund_code === fundCode && p.status === 'active');
  if (existing) {
    showToast('该基金已有定投计划，请先暂停或停止现有计划', 'error');
    return;
  }

  investContext = { fundCode, fundName: h.fund_name || fundCode };
  document.getElementById('invest-drawer-title').textContent = '📅 设置定投 · ' + investContext.fundName;
  document.getElementById('invest-amount').value = '';
  document.getElementById('invest-freq').value = 'weekly';
  onInvestFreqChange();
  document.getElementById('invest-submit').disabled = true;

  document.getElementById('invest-overlay').classList.add('open');
  document.getElementById('invest-drawer').classList.add('open');
}

function closeInvestDrawer() {
  document.getElementById('invest-overlay').classList.remove('open');
  document.getElementById('invest-drawer').classList.remove('open');
}

function setInvestAmount(val) {
  document.getElementById('invest-amount').value = val;
  document.querySelectorAll('#invest-drawer .quick-amount').forEach(e => {
    e.classList.toggle('active', parseInt(e.textContent) === val);
  });
  onInvestFormChange();
}

function onInvestFreqChange() {
  const freq = document.getElementById('invest-freq').value;
  const daySelect = document.getElementById('invest-day');
  daySelect.innerHTML = '';
  if (freq === 'monthly') {
    for (let i = 1; i <= 28; i++) {
      daySelect.innerHTML += `<option value="${i}">${i}号</option>`;
    }
    daySelect.value = '15';
  } else {
    const days = ['周一','周二','周三','周四','周五'];
    for (let i = 0; i < 5; i++) {
      daySelect.innerHTML += `<option value="${i+1}">${days[i]}</option>`;
    }
    daySelect.value = '3';
  }
  onInvestFormChange();
}

function onInvestFormChange() {
  const amount = parseFloat(document.getElementById('invest-amount').value) || 0;
  document.getElementById('invest-submit').disabled = amount <= 0;
}

function submitInvestPlan() {
  const amount = parseFloat(document.getElementById('invest-amount').value) || 0;
  if (amount <= 0) return;

  const plan = {
    id: Date.now() + '_' + Math.random().toString(36).slice(2, 8),
    fund_code: investContext.fundCode,
    fund_name: investContext.fundName,
    amount: amount,
    frequency: document.getElementById('invest-freq').value,
    day: parseInt(document.getElementById('invest-day').value),
    status: 'active',
    created_at: new Date().toISOString(),
    last_executed: '',
    total_executed: 0,
  };

  const plans = getInvestPlans();
  plans.push(plan);
  saveInvestPlans(plans);

  closeInvestDrawer();
  showToast('定投计划已创建 ✅', 'success');
  loadPortfolio(true);
  renderInvestList();
}

// ---- 定投管理区域渲染 ----
function formatFrequency(plan) {
  if (plan.frequency === 'monthly') return '每月' + plan.day + '号';
  if (plan.frequency === 'biweekly') {
    const days = ['','周一','周二','周三','周四','周五'];
    return '每两周' + (days[plan.day] || '');
  }
  const days = ['','周一','周二','周三','周四','周五'];
  return '每' + (days[plan.day] || '');
}

function renderInvestList() {
  const plans = getInvestPlans().filter(p => p.status !== 'stopped');
  const titleEl = document.getElementById('invest-title');
  const listEl = document.getElementById('invest-list');

  if (plans.length === 0) {
    titleEl.style.display = 'none';
    listEl.innerHTML = '';
    return;
  }

  titleEl.style.display = 'flex';
  listEl.innerHTML = plans.map(p => {
    const statusIcon = p.status === 'active' ? '🟢' : '⏸️';
    const statusText = p.status === 'active' ? '执行中' : '已暂停';
    const totalAmount = p.total_executed * p.amount;
    let actions = '';
    if (p.status === 'active') {
      actions = `<button onclick="pauseInvest('${p.id}')">暂停</button>`;
    } else {
      actions = `<button onclick="resumeInvest('${p.id}')">恢复</button>
                 <button class="stop-btn" onclick="stopInvest('${p.id}')">停止</button>`;
    }
    return `<div class="invest-card">
      <div class="invest-card-header">
        <span class="invest-card-name">${p.fund_name}</span>
        <span class="invest-card-schedule">${formatFrequency(p)} ¥${p.amount}</span>
      </div>
      <div class="invest-card-status">
        ${statusIcon} ${statusText} · 已执行${p.total_executed}次 · 累计¥${totalAmount.toLocaleString()}
      </div>
      <div class="invest-card-actions">${actions}</div>
    </div>`;
  }).join('');
}

function pauseInvest(planId) {
  const plans = getInvestPlans();
  const p = plans.find(x => x.id === planId);
  if (p) { p.status = 'paused'; saveInvestPlans(plans); }
  showToast('定投已暂停', 'success');
  renderInvestList();
  loadPortfolio(true);
}

function resumeInvest(planId) {
  const plans = getInvestPlans();
  const p = plans.find(x => x.id === planId);
  if (p) { p.status = 'active'; saveInvestPlans(plans); }
  showToast('定投已恢复', 'success');
  renderInvestList();
  loadPortfolio(true);
}

function stopInvest(planId) {
  const plans = getInvestPlans();
  const p = plans.find(x => x.id === planId);
  if (p) { p.status = 'stopped'; saveInvestPlans(plans); }
  showToast('定投已停止', 'success');
  renderInvestList();
  loadPortfolio(true);
}

// ---- 定投自动执行检查 ----
let pendingInvestData = []; // [{plan, periods: [{date, nav}]}]

async function checkAutoInvest() {
  const plans = getInvestPlans().filter(p => p.status === 'active');
  if (plans.length === 0) return;

  const now = new Date();
  let totalPending = 0;
  let totalAmount = 0;
  pendingInvestData = [];

  for (const plan of plans) {
    const periods = getPendingPeriods(plan, now);
    if (periods.length > 0) {
      totalPending += periods.length;
      totalAmount += periods.length * plan.amount;
      pendingInvestData.push({ plan, periods });
    }
  }

  if (totalPending === 0) return;

  if (totalPending === 1 && pendingInvestData.length === 1) {
    // 单期：静默执行
    await executeSingleInvest(pendingInvestData[0].plan);
  } else {
    // 多期：显示横幅
    const banner = document.getElementById('pending-invest-banner');
    document.getElementById('pending-invest-title').textContent = `📅 有 ${totalPending} 期定投待执行（共¥${totalAmount.toLocaleString()}）`;
    let detail = pendingInvestData.map(d =>
      `${d.plan.fund_name}：${d.periods.length} 期 × ¥${d.plan.amount}`
    ).join('\n');
    document.getElementById('pending-invest-detail').textContent = detail;
    banner.classList.add('show');
  }
}

function getPendingPeriods(plan, now) {
  const periods = [];
  let lastExec = plan.last_executed ? new Date(plan.last_executed) : new Date(plan.created_at);
  let nextDate = getNextInvestDate(plan, lastExec);

  // 最多补 10 期，避免极端情况
  let maxPeriods = 10;
  while (nextDate <= now && maxPeriods > 0) {
    periods.push({ date: nextDate.toISOString().slice(0, 10) });
    lastExec = nextDate;
    nextDate = getNextInvestDate(plan, lastExec);
    maxPeriods--;
  }
  return periods;
}

function getNextInvestDate(plan, fromDate) {
  const d = new Date(fromDate);
  if (plan.frequency === 'monthly') {
    d.setMonth(d.getMonth() + 1);
    d.setDate(Math.min(plan.day, 28));
  } else if (plan.frequency === 'biweekly') {
    d.setDate(d.getDate() + 14);
    // 调整到目标周几
    const diff = (plan.day - d.getDay() + 7) % 7;
    if (diff > 0) d.setDate(d.getDate() + diff);
  } else {
    // weekly
    d.setDate(d.getDate() + 1); // 至少往后一天
    while (d.getDay() !== plan.day % 7) {
      d.setDate(d.getDate() + 1);
    }
  }
  // 跳过周末
  while (d.getDay() === 0 || d.getDay() === 6) {
    d.setDate(d.getDate() + 1);
  }
  d.setHours(12, 0, 0, 0);
  return d;
}

async function executeSingleInvest(plan) {
  // 获取最新净值
  let nav = 0;
  try {
    const res = await fetch(API + '/api/portfolio/refresh', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ holdings: [{ fund_code: plan.fund_code }] }),
    });
    const data = await res.json();
    if (data.holdings && data.holdings[0]) {
      nav = data.holdings[0].current_nav || 1;
    }
  } catch(e) { nav = 1; }

  const shares = plan.amount / nav;
  const tx = {
    id: Date.now() + '_' + Math.random().toString(36).slice(2, 8),
    fund_code: plan.fund_code,
    type: 'buy',
    amount: plan.amount,
    nav: Math.round(nav * 10000) / 10000,
    shares: Math.round(shares * 100) / 100,
    source: 'auto_invest',
    created_at: new Date().toISOString(),
    note: '自动定投',
  };
  addTransaction(tx);

  // 更新计划
  const plans = getInvestPlans();
  const p = plans.find(x => x.id === plan.id);
  if (p) {
    p.last_executed = new Date().toISOString();
    p.total_executed = (p.total_executed || 0) + 1;
    saveInvestPlans(plans);
  }

  recalcHolding(plan.fund_code);
  showToast(`定投已执行：${plan.fund_name} +¥${plan.amount}`, 'success');
  loadPortfolio(true);
  renderInvestList();
}

async function executePendingInvests() {
  const banner = document.getElementById('pending-invest-banner');
  const execBtn = banner.querySelector('.exec-btn');
  execBtn.disabled = true;
  execBtn.textContent = '执行中...';

  for (const { plan, periods } of pendingInvestData) {
    // 尝试获取历史净值
    let navMap = {};
    try {
      const start = periods[0].date;
      const end = periods[periods.length - 1].date;
      const res = await fetch(API + `/api/fund/${plan.fund_code}/nav-history?start=${start}&end=${end}`);
      const data = await res.json();
      if (data.nav_list) {
        for (const n of data.nav_list) navMap[n.date] = n.nav;
      }
    } catch(e) {}

    // 获取最新净值作为兜底
    let fallbackNav = 1;
    try {
      const res = await fetch(API + '/api/portfolio/refresh', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ holdings: [{ fund_code: plan.fund_code }] }),
      });
      const data = await res.json();
      if (data.holdings && data.holdings[0]) {
        fallbackNav = data.holdings[0].current_nav || 1;
      }
    } catch(e) {}

    for (const period of periods) {
      const nav = navMap[period.date] || fallbackNav;
      const shares = plan.amount / nav;
      const tx = {
        id: Date.now() + '_' + Math.random().toString(36).slice(2, 8),
        fund_code: plan.fund_code,
        type: 'buy',
        amount: plan.amount,
        nav: Math.round(nav * 10000) / 10000,
        shares: Math.round(shares * 100) / 100,
        source: 'auto_invest',
        created_at: period.date + 'T12:00:00.000Z',
        note: '定投补执行',
      };
      addTransaction(tx);
    }

    // 更新计划
    const plans = getInvestPlans();
    const p = plans.find(x => x.id === plan.id);
    if (p) {
      p.last_executed = new Date().toISOString();
      p.total_executed = (p.total_executed || 0) + periods.length;
      saveInvestPlans(plans);
    }
    recalcHolding(plan.fund_code);
  }

  banner.classList.remove('show');
  pendingInvestData = [];
  showToast('所有定投已执行 ✅', 'success');
  loadPortfolio(true);
  renderInvestList();
}

function skipPendingInvests() {
  // 更新 last_executed 到当前，跳过所有未执行期
  for (const { plan } of pendingInvestData) {
    const plans = getInvestPlans();
    const p = plans.find(x => x.id === plan.id);
    if (p) {
      p.last_executed = new Date().toISOString();
      saveInvestPlans(plans);
    }
  }
  document.getElementById('pending-invest-banner').classList.remove('show');
  pendingInvestData = [];
  showToast('已跳过', 'success');
}

function togglePendingDetail() {
  const el = document.getElementById('pending-invest-detail');
  el.style.display = el.style.display === 'none' ? 'block' : 'none';
}

// ---- Init ----
loadPortfolio();
renderInvestList();
// 延迟检查定投（等待净值数据加载）
setTimeout(checkAutoInvest, 3000);
</script>
