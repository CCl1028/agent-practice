version: "3.8"

services:
  fund-assistant:
    build:
      context: .
      args:
        - BUILD_VERSION=${BUILD_VERSION:-dev}
        - BUILD_TIME=${BUILD_TIME:-unknown}
        - GIT_COMMIT=${GIT_COMMIT:-unknown}
    container_name: fund-assistant
    restart: always
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data      # 持仓数据持久化
      - ./.env:/app/.env       # 环境变量
    environment:
      - TZ=Asia/Shanghai       # 确保定时任务用中国时区
