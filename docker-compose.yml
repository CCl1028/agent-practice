version: "3.8"

services:
  fund-assistant:
    build:
      context: .
      args:
        - BUILD_TIME=${BUILD_TIME:-unknown}
        - GIT_COMMIT=${GIT_COMMIT:-unknown}
    container_name: fund-assistant
    restart: always
    expose:
      - "8000"                 # 仅在 Docker 内部网络暴露，不再映射到宿主机
    volumes:
      - ./data:/app/data       # 持仓数据持久化
      - ./.env:/app/.env       # 环境变量
    environment:
      - TZ=Asia/Shanghai       # 确保定时任务用中国时区

  nginx:
    image: nginx:alpine
    container_name: nginx-proxy
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certbot/conf:/etc/letsencrypt:ro
    depends_on:
      - fund-assistant
