name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ============================================
  # Job 1: Lint + Type Check（最快，先跑）
  # ============================================
  lint:
    name: 🔍 Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff mypy

      - name: Ruff lint
        run: ruff check src/ server.py main.py --output-format=github

      - name: Ruff format check
        run: ruff format --check src/ server.py main.py

      - name: Mypy type check
        run: mypy src/ server.py --ignore-missing-imports

  # ============================================
  # Job 2: 单元测试 + 覆盖率
  # ============================================
  test:
    name: 🧪 Tests
    runs-on: ubuntu-latest
    needs: lint          # lint 通过才跑测试
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run tests with coverage
        run: |
          pytest --cov=src --cov=server --cov-report=term-missing --cov-report=xml -x
        env:
          # 测试时不需要真实 API Key，用占位值避免启动报错
          OPENAI_API_KEY: "sk-test-placeholder"

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  # ============================================
  # Job 3: Docker 构建验证
  # ============================================
  docker-build:
    name: 🐳 Docker Build
    runs-on: ubuntu-latest
    needs: lint          # lint 通过才构建
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build \
            --build-arg BUILD_TIME=$(date -u +"%Y-%m-%dT%H:%M:%SZ") \
            --build-arg GIT_COMMIT=${{ github.sha }} \
            -t fundpal:ci-${{ github.sha }} \
            .

      - name: Verify image runs
        run: |
          docker run --rm fundpal:ci-${{ github.sha }} python -c "
          import src.config
          print('✅ Python imports OK')
          "
